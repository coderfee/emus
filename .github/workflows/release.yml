name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        run: |
          # 从tag中提取版本号，移除v前缀
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Using version: $VERSION"

      - name: Build App
        run: |
          xcodebuild archive \
            -scheme Emus \
            -configuration Release \
            -archivePath build/Emus.xcarchive \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$VERSION" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-"

      - name: Export App
        run: |
          mkdir -p build/Export
          cp -R build/Emus.xcarchive/Products/Applications/Emus.app build/Export/Emus.app
          # 显式执行一次 ad-hoc 签名确保生效
          codesign --force --deep --sign - build/Export/Emus.app

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Emus Installer" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "Emus.app" 200 190 \
            --hide-extension "Emus.app" \
            --app-drop-link 600 185 \
            "Emus-${{ github.ref_name }}.dmg" \
            "build/Export/"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: Emus-${{ github.ref_name }}.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
