name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build App
        run: |
          xcodebuild archive \
            -scheme Emus \
            -configuration Release \
            -archivePath build/Emus.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY=""

      - name: Export App
        run: |
          mkdir -p build/Export
          cp -R build/Emus.xcarchive/Products/Applications/Emus.app build/Export/Emus.app

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Emus Installer" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "Emus.app" 200 190 \
            --hide-extension "Emus.app" \
            --app-drop-link 600 185 \
            "Emus-${{ github.ref_name }}.dmg" \
            "build/Export/"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: Emus-${{ github.ref_name }}.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
